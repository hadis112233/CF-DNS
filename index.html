<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cloudflare IP</title>
<style>
    body{background:#fff;color:#333;font-family:monospace;line-height:1.6;padding:20px;}
    pre{white-space:pre-wrap;word-wrap:break-word;}
</style>
</head>
<body>
<pre id="ipList">Loading...</pre>

<script>
// 每天 03:10 自动更新
function autoUpdateAt310() {
    setInterval(() => {
        const now = new Date();
        if (now.getHours() === 3 && now.getMinutes() === 10) {
            loadIPs();
        }
    }, 60000);
}

// 加载 IP 列表
async function loadIPs() {
    try {
        const res = await fetch("https://raw.githubusercontent.com/hadis112233/CF-DNS/main/cloudflare_ips.txt", { cache: "no-store" });
        let text = await res.text();
        text = text.replace(/:443/g, "").trim();
        document.getElementById("ipList").innerText = text;
    } catch (e) {
        document.getElementById("ipList").innerText = "Load failed";
    }
}

// 测速功能（保留！）
async function testSpeed(ip) {
    return new Promise((resolve) => {
        const start = Date.now();
        const img = new Image();
        img.onload = () => resolve(Date.now() - start);
        img.onerror = () => resolve(9999);
        img.src = `https://speed.cloudflare.com/__down?bytes=10000&${Math.random()}`;
        setTimeout(() => resolve(9999), 3000);
    });
}

// 初始化
loadIPs();
autoUpdateAt310();
</script>
</body>
</html>
