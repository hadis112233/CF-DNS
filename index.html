<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cloudflare 优选 IP</title>
<link rel="icon" href="https://cloudflare.com/favicon.ico">
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
}
:root {
    --bg: #f8fafc;
    --card: #ffffff;
    --text: #1e293b;
    --gray: #64748b;
    --primary: #4f46e5;
    --success: #10b981;
    --danger: #ef4444;
}
@media (prefers-color-scheme: dark) {
    :root {
        --bg: #0f172a;
        --card: #1e293b;
        --text: #f1f5f9;
        --gray: #94a3b8;
    }
}
body {
    background: var(--bg);
    color: var(--text);
    padding: 30px 20px;
    max-width: 900px;
    margin: 0 auto;
}
.header {
    text-align: center;
    margin-bottom: 30px;
}
.header h1 {
    font-size: 26px;
    margin-bottom: 8px;
    color: var(--text);
}
.header p {
    color: var(--gray);
    font-size: 14px;
}
.card {
    background: var(--card);
    border-radius: 16px;
    padding: 24px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.05);
    margin-bottom: 20px;
}
.ip-container {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 12px;
    margin-top: 16px;
}
.ip-item {
    background: var(--bg);
    padding: 12px;
    border-radius: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: monospace;
    font-size: 14px;
}
.ip-item .ping {
    font-size: 12px;
    padding: 2px 6px;
    border-radius: 4px;
    background: rgba(79, 70, 229, 0.1);
    color: var(--primary);
}
.ip-item .ping.fast {
    background: rgba(16, 185, 129, 0.1);
    color: var(--success);
}
.ip-item .ping.slow {
    background: rgba(239, 68, 68, 0.1);
    color: var(--danger);
}
.btn {
    display: inline-block;
    padding: 10px 18px;
    border-radius: 10px;
    border: none;
    background: var(--primary);
    color: white;
    font-weight: 500;
    cursor: pointer;
    margin-top: 10px;
    transition: 0.2s;
}
.btn:hover {
    opacity: 0.9;
}
.status {
    font-size: 13px;
    color: var(--gray);
    margin-top: 10px;
}
.loading {
    text-align: center;
    padding: 30px 0;
    color: var(--gray);
}
</style>
</head>
<body>

<div class="header">
    <h1>🌍 Cloudflare 优选 IP 列表</h1>
    <p>自动更新 | 干净无广告</p>
</div>

<div class="card">
    <div id="status" class="status">⏳ 加载中...</div>
    <div id="ipList" class="ip-container">
        <div class="loading">正在获取最新 IP...</div>
    </div>
    <button class="btn" onclick="copyAllIPs()">📋 一键复制全部 IP</button>
</div>

<script>
const IP_FILE = "https://raw.githubusercontent.com/hadis112233/CF-DNS/main/cloudflare_ips.txt";
let ipList = [];

// 加载 IP + 速度
async function loadIPs() {
    const status = document.getElementById("status");
    const container = document.getElementById("ipList");
    status.innerText = "🔄 更新中...";
    
    try {
        const res = await fetch(IP_FILE, { cache: "no-store" });
        let text = await res.text();
        text = text.replace(/:443/g, "").trim();
        ipList = text.split(/\n/).filter(i => i.trim());
        
        renderIPs();
        
        const time = new Date().toLocaleString();
        status.innerText = `✅ 最后更新：${time}`;
    } catch (e) {
        container.innerHTML = `<div class="loading">❌ 加载失败</div>`;
        status.innerText = "❌ 更新失败";
    }
}

// 渲染（直接读取TXT里的速度）
function renderIPs() {
    const container = document.getElementById("ipList");
    container.innerHTML = "";
    
    ipList.forEach(line => {
        // 分割 IP 和 速度
        const parts = line.trim().split(/\s+/);
        const ip = parts[0] || line;
        const ping = parts.slice(1).join(" ") || "";

        const div = document.createElement("div");
        div.className = "ip-item";
        
        let pingHtml = "";
        if (ping) {
            const ms = parseInt(ping);
            let pingClass = "ping";
            if (!isNaN(ms)) {
                if (ms < 200) pingClass = "ping fast";
                else pingClass = "ping slow";
            }
            pingHtml = `<span class="${pingClass}">${ping}</span>`;
        }

        div.innerHTML = `
            <span>${ip}</span>
            ${pingHtml}
        `;
        container.appendChild(div);
    });
}

// 一键复制
function copyAllIPs() {
    const text = ipList.join("\n");
    navigator.clipboard.writeText(text).then(() => {
        alert("✅ 复制成功！");
    });
}

// 启动
loadIPs();
</script>
</body>
</html>
