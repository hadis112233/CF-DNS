<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cloudflare 优选 IP</title>
<link rel="icon" href="https://cloudflare.com/favicon.ico">
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
}
:root {
    --bg: #f8fafc;
    --card: #ffffff;
    --text: #1e293b;
    --gray: #64748b;
    --primary: #4f46e5;
    --success: #10b981;
    --warning: #f59e0b;
    --danger: #ef4444;
    --hover: #f1f5f9;
    --border: #e2e8f0;
    --shadow: 0 12px 40px rgba(0,0,0,0.08);
}
[data-theme="dark"] {
    --bg: #0f172a;
    --card: #1e293b;
    --text: #f1f5f9;
    --gray: #94a3b8;
    --hover: #273449;
    --border: #334155;
    --shadow: 0 12px 40px rgba(0,0,0,0.2);
}
body {
    background: var(--bg);
    color: var(--text);
    padding: 30px 15px;
    max-width: 1000px;
    margin: 0 auto;
    min-height: 100vh;
    transition: background 0.3s ease, color 0.3s ease;
}
.header {
    text-align: center;
    margin-bottom: 30px;
    position: relative;
}
.header h1 {
    font-size: 26px;
    margin-bottom: 10px;
    font-weight: 800;
    background: linear-gradient(90deg, #4f46e5, #8b5cf6);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}
.header p {
    color: var(--gray);
    font-size: 14px;
}
.theme-switch {
    position: absolute;
    top: 0;
    right: 0;
    width: 50px;
    height: 26px;
    border-radius: 99px;
    background: var(--gray);
    cursor: pointer;
    border: none;
    transition: background 0.3s ease;
}
.theme-switch::after {
    content: "🌞";
    position: absolute;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: #fff;
    top: 3px;
    left: 3px;
    transition: transform 0.3s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
}
[data-theme="dark"] .theme-switch {
    background: var(--primary);
}
[data-theme="dark"] .theme-switch::after {
    content: "🌙";
    transform: translateX(24px);
}
.card {
    background: var(--card);
    border-radius: 20px;
    padding: 24px 20px;
    box-shadow: var(--shadow);
    border: 1px solid var(--border);
    transition: background 0.3s ease, border-color 0.3s ease;
}
.status {
    font-size: 13px;
    color: var(--gray);
    margin-bottom: 20px;
    padding-bottom: 15px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 6px;
}

/* 表格布局（完美对齐） */
.table-head, .ip-item {
    display: grid;
    grid-template-columns: 50px 1fr 100px 80px 100px;
    gap: 16px;
    align-items: center;
    padding: 0 16px;
    width: 100%;
}
.table-head {
    font-weight: 600;
    color: var(--primary);
    padding-bottom: 14px;
    font-size: 13px;
    text-align: left;
}
.ip-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
    max-height: 520px;
    overflow-y: auto;
    padding-right: 6px;
    margin-bottom: 24px;
    width: 100%;
}
.ip-item {
    padding: 14px 16px;
    background: var(--bg);
    border-radius: 14px;
    font-family: 'SF Mono', Monaco, monospace;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.25s ease;
    user-select: none;
    white-space: nowrap;
    position: relative;
}
.ip-item:hover {
    background: var(--hover);
    border-color: var(--primary);
}

.star {
    color: #f59e0b;
    font-weight: bold;
    font-size: 16px;
    text-align: center;
    width: 50px;
}
.empty-star {
    width: 50px;
    height: 18px;
}

/* 测速状态 */
.ping-normal { color: var(--success); }
.ping-warn { color: var(--warning); }
.ping-fail { color: var(--danger); }
.ping-text { font-weight: 500; }

.btn {
    width: 100%;
    padding: 16px 20px;
    border-radius: 14px;
    border: none;
    background: linear-gradient(135deg, #4f46e5, #6366f1);
    color: white;
    font-weight: 600;
    font-size: 15px;
    cursor: pointer;
    transition: all 0.25s ease;
}
.btn:hover { transform: translateY(-2px); }

.loading {
    text-align: center;
    padding: 50px 0;
    color: var(--gray);
    font-size: 14px;
}
::-webkit-scrollbar {width: 4px;}
::-webkit-scrollbar-thumb {background: var(--gray); border-radius: 10px;}

.toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--success);
    color: #fff;
    padding: 12px 20px;
    border-radius: 12px;
    font-size: 14px;
    opacity: 0;
    transition: 0.3s;
    pointer-events: none;
    white-space: nowrap;
}
.toast.show {
    opacity: 1;
    transform: translate(-50%, -6px);
}

/* 手机端 */
@media (max-width: 480px) {
    .table-head, .ip-item {
        grid-template-columns: 40px 1fr 80px 70px 80px;
        gap: 8px;
        padding: 0 12px;
    }
    .ip-item {
        font-size: 12px;
        padding: 12px 14px;
    }
    .card { padding: 20px 16px; }
}
</style>
</head>
<body>

<div class="header">
    <h1>🌍 Cloudflare 优选 IP</h1>
    <p>点击复制 · 自动排序 · 本地延迟测速</p>
    <button class="theme-switch" id="themeBtn"></button>
</div>

<div class="card">
    <div id="status" class="status">⏳ 加载中...</div>

    <div class="table-head">
        <div></div>
        <div>IP 地址</div>
        <div>地区</div>
        <div>速度</div>
        <div>本地延迟</div>
    </div>

    <div id="ipList" class="ip-list">
        <div class="loading">正在获取最新 IP 数据...</div>
    </div>

    <button class="btn" onclick="copyAll()">📋 一键复制全部</button>
</div>

<div id="toast" class="toast">✅ IP 复制成功</div>

<script>
const IP_FILE = "cloudflare_ips.txt";
let ipData = [];
let lastFileContent = "";

// 深色模式
const themeBtn = document.getElementById("themeBtn");
function initTheme() {
    const saved = localStorage.getItem("theme") || (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
    document.documentElement.setAttribute("data-theme", saved);
}
themeBtn.onclick = () => {
    const current = document.documentElement.getAttribute("data-theme");
    const next = current === "dark" ? "light" : "dark";
    document.documentElement.setAttribute("data-theme", next);
    localStorage.setItem("theme", next);
};
initTheme();

// 加载IP
async function loadIPs() {
    const status = document.getElementById("status");
    const container = document.getElementById("ipList");
    status.textContent = "🔄 更新中...";

    try {
        const res = await fetch(IP_FILE, { cache: "no-store" });
        if (!res.ok) throw new Error("请求失败");
        let text = await res.text();
        text = text.replace(/:443/g, "").trim();

        if (lastFileContent && lastFileContent !== text) {
            lastFileContent = text;
            renderList();
        }
        lastFileContent = text;

        const lines = text.split("\n").filter(i => i.trim());
        if (lines.length === 0) {
            container.innerHTML = `<div class="loading">暂无 IP 数据</div>`;
            status.textContent = "✅ 数据为空";
            ipData = [];
            return;
        }

        ipData = lines.map(line => {
            try {
                const [ipPart, rest] = line.split("#");
                if (!rest) return { ip: ipPart.trim(), area: "-", speed: "-", speedNum: 0 };
                const [area, speed] = rest.split("-").map(i => i.trim());
                const speedNum = parseFloat(speed) || 0;
                return { ip: ipPart.trim(), area, speed, speedNum };
            } catch {
                return { ip: line.trim(), area: "-", speed: "-", speedNum: 0 };
            }
        });

        ipData.sort((a, b) => b.speedNum - a.speedNum);
        renderList();
        status.textContent = `✅ 最后更新：${new Date().toLocaleString()}`;
    } catch (e) {
        container.innerHTML = `<div class="loading">❌ 加载失败</div>`;
        status.textContent = "❌ 更新失败";
    }
}

// 渲染列表
function renderList() {
    const container = document.getElementById("ipList");
    container.innerHTML = "";
    if (ipData.length === 0) {
        container.innerHTML = `<div class="loading">暂无可用 IP</div>`;
        return;
    }

    ipData.forEach((item, index) => {
        const div = document.createElement("div");
        div.className = "ip-item";
        let star = index < 2 ? '<div class="star">★</div>' : '<div class="empty-star"></div>';
        
        div.innerHTML = `
            ${star}
            <span>${item.ip}</span>
            <span>${item.area}</span>
            <span>${item.speed}</span>
            <span class="ping-text" id="ping-${index}">-</span>
        `;

        // 单击复制 / 双击测速
        div.onclick = () => {
            navigator.clipboard.writeText(item.ip).then(() => showToast());
        };
        div.ondblclick = () => {
            testPing(item.ip, index);
            showToast(`🔍 正在测试 ${item.ip} 延迟...`);
        };
        container.appendChild(div);
    });
}

// ====================== 本地延迟测速核心 ======================
async function testPing(ip, index) {
    const el = document.getElementById(`ping-${index}`);
    el.textContent = "测试中...";
    el.className = "ping-text";

    let times = [];
    const timeout = 2000;

    for (let i = 0; i < 3; i++) {
        const start = performance.now();
        try {
            await fetch(`https://${ip}/cdn-cgi/trace`, {
                mode: "no-cors",
                cache: "no-store",
                signal: AbortSignal.timeout(timeout)
            });
            const ms = Math.round(performance.now() - start);
            times.push(ms);
        } catch (e) { times.push(9999); }
        await new Promise(r => setTimeout(r, 200));
    }

    const valid = times.filter(t => t < 9999);
    if (valid.length === 0) {
        el.textContent = "超时";
        el.className = "ping-text ping-fail";
        return;
    }

    const avg = Math.round(valid.reduce((a, b) => a + b, 0) / valid.length);
    el.textContent = `${avg} ms`;

    if (avg < 150) el.className = "ping-text ping-normal";
    else if (avg < 300) el.className = "ping-text ping-warn";
    else el.className = "ping-text ping-fail";
}

// 复制全部
function copyAll() {
    if (ipData.length === 0) return showToast("❌ 无数据可复制");
    const text = ipData.map(i => `${i.ip}#${i.area}-${i.speed}`).join("\n");
    navigator.clipboard.writeText(text).then(() => showToast("✅ 全部复制成功"));
}

// 提示
function showToast(msg = "✅ IP 复制成功") {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.classList.add("show");
    setTimeout(() => t.classList.remove("show"), 1800);
}

// 自动刷新
setInterval(loadIPs, 60000);
loadIPs();
</script>
</body>
</html>
