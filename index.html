<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cloudflare 优选 IP</title>
<link rel="icon" href="https://cloudflare.com/favicon.ico">
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
}
:root {
    --bg: #f8fafc;
    --card: #ffffff;
    --text: #1e293b;
    --gray: #64748b;
    --primary: #4f46e5;
    --success: #10b981;
    --danger: #ef4444;
}
@media (prefers-color-scheme: dark) {
    :root {
        --bg: #0f172a;
        --card: #1e293b;
        --text: #f1f5f9;
        --gray: #94a3b8;
    }
}
body {
    background: var(--bg);
    color: var(--text);
    padding: 30px 20px;
    max-width: 1000px;
    margin: 0 auto;
}
.header {
    text-align: center;
    margin-bottom: 30px;
}
.header h1 {
    font-size: 26px;
    margin-bottom: 8px;
    color: var(--text);
}
.header p {
    color: var(--gray);
    font-size: 14px;
}
.card {
    background: var(--card);
    border-radius: 16px;
    padding: 24px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.05);
    margin-bottom: 20px;
}

/* 三列布局 */
.ip-table {
    margin-top: 16px;
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
    font-size: 14px;
}
.table-header {
    font-weight: bold;
    color: var(--primary);
    padding: 10px 0;
    text-align: center;
    background: var(--bg);
    border-radius: 8px;
}
.ip-row {
    display: contents;
}
.ip-row span {
    background: var(--bg);
    padding: 10px;
    border-radius: 8px;
    text-align: center;
    font-family: monospace;
}
.speed {
    font-size: 13px;
    font-weight: 500;
}
.speed.fast {
    color: var(--success);
}
.speed.slow {
    color: var(--danger);
}
.btn {
    padding: 10px 18px;
    border-radius: 10px;
    border: none;
    background: var(--primary);
    color: white;
    font-weight: 500;
    cursor: pointer;
    margin-top: 16px;
    transition: 0.2s;
}
.btn:hover {
    opacity: 0.9;
}
.status {
    font-size: 13px;
    color: var(--gray);
    margin-top: 10px;
}
.loading {
    text-align: center;
    padding: 30px 0;
    color: var(--gray);
}
</style>
</head>
<body>

<div class="header">
    <h1>🌍 Cloudflare 优选 IP 列表</h1>
    <p>IP地址 | 地区 | 速度 三列展示</p>
</div>

<div class="card">
    <div id="status" class="status">⏳ 加载中...</div>
    
    <div class="ip-table" id="tableHead">
        <div class="table-header">IP 地址</div>
        <div class="table-header">地区</div>
        <div class="table-header">速度</div>
    </div>

    <div id="ipList" class="loading">正在获取最新 IP...</div>
    
    <button class="btn" onclick="copyAll()">📋 一键复制全部内容</button>
</div>

<script>
const IP_FILE = "https://raw.githubusercontent.com/hadis112233/CF-DNS/main/cloudflare_ips.txt";
let ipData = [];

// 加载文件
async function loadIPs() {
    const status = document.getElementById("status");
    const container = document.getElementById("ipList");
    status.innerText = "🔄 更新中...";

    try {
        const res = await fetch(IP_FILE, { cache: "no-store" });
        let text = await res.text();
        text = text.replace(/:443/g, "").trim();
        const lines = text.split("\n").filter(i => i.trim());

        ipData = lines.map(line => {
            const parts = line.trim().split(/\s+/);
            return {
                ip: parts[0] || "",
                area: parts[1] || "",
                speed: parts[2] || ""
            };
        });

        renderTable();
        status.innerText = `✅ 最后更新：${new Date().toLocaleString()}`;
    } catch (e) {
        container.innerHTML = `<div class="loading">❌ 加载失败</div>`;
        status.innerText = "❌ 更新失败";
    }
}

// 渲染三列
function renderTable() {
    const container = document.getElementById("ipList");
    container.style.display = "grid";
    container.style.gridTemplateColumns = "1fr 1fr 1fr";
    container.style.gap = "8px";
    container.innerHTML = "";

    ipData.forEach(item => {
        const ip = document.createElement("span");
        ip.textContent = item.ip;

        const area = document.createElement("span");
        area.textContent = item.area;

        const speed = document.createElement("span");
        speed.className = "speed";
        speed.textContent = item.speed;

        const ms = parseInt(item.speed);
        if (!isNaN(ms)) {
            if (ms < 200) speed.classList.add("fast");
            else speed.classList.add("slow");
        }

        container.appendChild(ip);
        container.appendChild(area);
        container.appendChild(speed);
    });
}

// 一键复制
function copyAll() {
    const text = ipData.map(i => `${i.ip} ${i.area} ${i.speed}`).join("\n");
    navigator.clipboard.writeText(text).then(() => {
        alert("✅ 复制成功！");
    });
}

loadIPs();
</script>
</body>
</html>
