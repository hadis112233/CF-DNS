<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cloudflare 优选 IP</title>
<link rel="icon" href="https://cloudflare.com/favicon.ico">
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
}
:root {
    --bg: #f8fafc;
    --card: #ffffff;
    --text: #1e293b;
    --gray: #64748b;
    --primary: #4f46e5;
    --success: #10b981;
    --hover: #f1f5f9;
}
@media (prefers-color-scheme: dark) {
    :root {
        --bg: #0f172a;
        --card: #1e293b;
        --text: #f1f5f9;
        --gray: #94a3b8;
        --hover: #273449;
    }
}
body {
    background: var(--bg);
    color: var(--text);
    padding: 40px 20px;
    max-width: 1000px;
    margin: 0 auto;
    line-height: 1.5;
}
.header {
    text-align: center;
    margin-bottom: 36px;
}
.header h1 {
    font-size: 30px;
    margin-bottom: 10px;
    font-weight: 700;
}
.header p {
    color: var(--gray);
    font-size: 15px;
}
.card {
    background: var(--card);
    border-radius: 20px;
    padding: 30px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.06);
    margin-bottom: 25px;
}
.status {
    font-size: 14px;
    color: var(--gray);
    margin-bottom: 20px;
    padding-bottom: 15px;
    border-bottom: 1px solid var(--hover);
}
.table-head {
    display: grid;
    grid-template-columns: 1.2fr 1fr 0.8fr;
    gap: 12px;
    font-weight: 600;
    color: var(--primary);
    padding: 0 10px 12px;
    font-size: 14px;
}
.ip-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
    max-height: 520px;
    overflow-y: auto;
    padding-right: 5px;
    margin-bottom: 24px;
}
.ip-item {
    display: grid;
    grid-template-columns: 1.2fr 1fr 0.8fr;
    gap: 12px;
    align-items: center;
    padding: 14px 16px;
    background: var(--bg);
    border-radius: 12px;
    font-family: monospace;
    font-size: 15px;
    cursor: pointer;
    transition: all 0.2s ease;
    user-select: none;
    text-align: center;
}
.ip-item:hover {
    background: var(--hover);
    transform: translateY(-1px);
}
.ip-item:active {
    transform: scale(0.985);
}
.btns {
    display: flex;
    gap: 12px;
}
.btn {
    flex: 1;
    padding: 14px 20px;
    border-radius: 14px;
    border: none;
    background: var(--primary);
    color: white;
    font-weight: 600;
    font-size: 15px;
    cursor: pointer;
    transition: all 0.2s;
}
.btn:hover {
    opacity: 0.9;
    transform: translateY(-1px);
}
.loading {
    text-align: center;
    padding: 50px 0;
    color: var(--gray);
    font-size: 15px;
}
::-webkit-scrollbar {width: 6px;}
::-webkit-scrollbar-thumb {background: var(--gray); border-radius: 10px;}
.toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--success);
    color: #fff;
    padding: 10px 18px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 500;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
}
.toast.show {
    opacity: 1;
}
</style>
</head>
<body>

<div class="header">
    <h1>🌍 Cloudflare 优选 IP 列表</h1>
    <p>点击IP即可复制 · 干净美观</p>
</div>

<div class="card">
    <div id="status" class="status">⏳ 加载中...</div>

    <div class="table-head">
        <div>IP 地址</div>
        <div>地区</div>
        <div>速度</div>
    </div>

    <div id="ipList" class="ip-list">
        <div class="loading">正在获取最新 IP 数据...</div>
    </div>

    <button class="btn" onclick="copyAll()">📋 一键复制全部</button>
</div>

<div id="toast" class="toast">✅ IP 复制成功</div>

<script>
const IP_FILE = "https://raw.githubusercontent.com/hadis112233/CF-DNS/main/cloudflare_ips.txt";
let ipData = [];

async function loadIPs() {
    const status = document.getElementById("status");
    const container = document.getElementById("ipList");
    status.textContent = "🔄 更新中...";

    try {
        const res = await fetch(IP_FILE, { cache: "no-store" });
        let text = await res.text();
        text = text.replace(/:443/g, "").trim();
        const lines = text.split("\n").filter(i => i.trim());

        ipData = lines.map(line => {
            const parts = line.trim().split(/\s+/);
            return {
                ip: parts[0] || "",
                area: parts[1] || "-",
                speed: parts[2] || "-"
            };
        });

        renderList();
        status.textContent = `✅ 最后更新：${new Date().toLocaleString()}`;
    } catch (e) {
        container.innerHTML = `<div class="loading">❌ 加载失败</div>`;
        status.textContent = "❌ 更新失败";
    }
}

function renderList() {
    const container = document.getElementById("ipList");
    container.innerHTML = "";

    ipData.forEach(item => {
        const div = document.createElement("div");
        div.className = "ip-item";
        
        div.innerHTML = `
            <span>${item.ip}</span>
            <span>${item.area}</span>
            <span>${item.speed}</span>
        `;

        div.onclick = () => {
            navigator.clipboard.writeText(item.ip).then(() => showToast());
        };
        container.appendChild(div);
    });
}

function copyAll() {
    const text = ipData.map(i => `${i.ip} ${i.area} ${i.speed}`).join("\n");
    navigator.clipboard.writeText(text).then(() => showToast("✅ 全部复制成功"));
}

function showToast(msg = "✅ IP 复制成功") {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.classList.add("show");
    setTimeout(() => t.classList.remove("show"), 1300);
}

loadIPs();
</script>
</body>
</html>
