<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cloudflare 优选 IP</title>
<link rel="icon" href="https://cloudflare.com/favicon.ico">
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
}
:root {
    --bg: #f8fafc;
    --card: #ffffff;
    --text: #1e293b;
    --gray: #64748b;
    --primary: #4f46e5;
    --success: #10b981;
    --hover: #f1f5f9;
    --border: #e2e8f0;
    --shadow: 0 12px 40px rgba(0,0,0,0.08);
}
@media (prefers-color-scheme: dark) {
    :root {
        --bg: #0f172a;
        --card: #1e293b;
        --text: #f1f5f9;
        --gray: #94a3b8;
        --hover: #273449;
        --border: #334155;
        --shadow: 0 12px 40px rgba(0,0,0,0.2);
    }
}
body {
    background: var(--bg);
    color: var(--text);
    padding: 50px 20px;
    max-width: 1000px;
    margin: 0 auto;
    line-height: 1.6;
    min-height: 100vh;
}
/* 头部美化 */
.header {
    text-align: center;
    margin-bottom: 40px;
    animation: fadeIn 0.6s ease forwards;
}
.header h1 {
    font-size: 34px;
    margin-bottom: 12px;
    font-weight: 800;
    background: linear-gradient(90deg, #4f46e5, #8b5cf6);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}
.header p {
    color: var(--gray);
    font-size: 16px;
    opacity: 0.9;
}
/* 卡片美化 */
.card {
    background: var(--card);
    border-radius: 24px;
    padding: 36px;
    box-shadow: var(--shadow);
    margin-bottom: 30px;
    border: 1px solid var(--border);
    animation: fadeIn 0.7s ease forwards;
}
.status {
    font-size: 14px;
    color: var(--gray);
    margin-bottom: 24px;
    padding-bottom: 18px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
}
/* 统一网格布局（修复对齐核心） */
.table-head, .ip-item {
    display: grid;
    grid-template-columns: 36px 1.2fr 1fr 0.8fr;
    gap: 16px;
    align-items: center;
    padding: 0 12px;
}
/* 表格头部 */
.table-head {
    font-weight: 600;
    color: var(--primary);
    padding-bottom: 16px;
    font-size: 14px;
    letter-spacing: 0.3px;
}
/* IP 列表 */
.ip-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
    max-height: 560px;
    overflow-y: auto;
    padding-right: 8px;
    margin-bottom: 28px;
}
.ip-item {
    padding: 16px 20px;
    background: var(--bg);
    border-radius: 16px;
    font-family: 'SF Mono', Monaco, monospace;
    font-size: 15px;
    cursor: pointer;
    transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
    user-select: none;
    border: 1px solid transparent;
}
.ip-item:hover {
    background: var(--hover);
    transform: translateY(-2px);
    border-color: var(--primary);
    box-shadow: 0 6px 16px rgba(79,70,229,0.1);
}
.ip-item:active {
    transform: scale(0.98);
}
/* 星级 */
.star {
    color: #f59e0b;
    font-weight: bold;
    font-size: 18px;
    text-align: center;
}
.empty-star {
    width: 36px;
    height: 20px;
}
/* 按钮 */
.btn {
    width: 100%;
    padding: 18px 24px;
    border-radius: 16px;
    border: none;
    background: linear-gradient(135deg, #4f46e5, #6366f1);
    color: white;
    font-weight: 600;
    font-size: 16px;
    cursor: pointer;
    transition: all 0.25s ease;
    box-shadow: 0 6px 20px rgba(79,70,229,0.25);
}
.btn:hover {
    transform: translateY(-3px);
    box-shadow: 0 10px 28px rgba(79,70,229,0.35);
}
/* 加载 */
.loading {
    text-align: center;
    padding: 60px 0;
    color: var(--gray);
    font-size: 15px;
}
/* 滚动条 */
::-webkit-scrollbar {width: 6px;}
::-webkit-scrollbar-track {background: transparent; border-radius: 10px;}
::-webkit-scrollbar-thumb {background: var(--gray); border-radius: 10px;}
/* 提示框 */
.toast {
    position: fixed;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--success);
    color: #fff;
    padding: 14px 24px;
    border-radius: 14px;
    font-size: 15px;
    font-weight: 500;
    opacity: 0;
    transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    pointer-events: none;
    box-shadow: 0 8px 24px rgba(16,185,129,0.25);
}
.toast.show {
    opacity: 1;
    transform: translate(-50%, -8px);
}
/* 淡入动画 */
@keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}
</style>
</head>
<body>

<div class="header">
    <h1>🌍 Cloudflare 优选 IP 列表</h1>
    <p>点击IP复制 · 自动拆分 · 速度排序 · 自动更新</p>
</div>

<div class="card">
    <div id="status" class="status">⏳ 加载中...</div>

    <div class="table-head">
        <div></div>
        <div>IP 地址</div>
        <div>地区</div>
        <div>速度</div>
    </div>

    <div id="ipList" class="ip-list">
        <div class="loading">正在获取最新 IP 数据...</div>
    </div>

    <button class="btn" onclick="copyAll()">📋 一键复制全部</button>
</div>

<div id="toast" class="toast">✅ IP 复制成功</div>

<script>
const IP_FILE = "cloudflare_ips.txt";
let ipData = [];
let lastFileContent = "";

async function loadIPs() {
    const status = document.getElementById("status");
    const container = document.getElementById("ipList");
    status.textContent = "🔄 更新中...";

    try {
        const res = await fetch(IP_FILE, { cache: "no-store" });
        let text = await res.text();
        text = text.replace(/:443/g, "").trim();
        
        if (lastFileContent && lastFileContent !== text) {
            location.reload();
            return;
        }
        lastFileContent = text;

        const lines = text.split("\n").filter(i => i.trim());
        ipData = lines.map(line => {
            const [ipPart, rest] = line.split("#");
            if (!rest) return { ip: ipPart, area: "-", speed: "-", speedNum: 0 };
            
            const [area, speed] = rest.split("-");
            const speedNum = parseFloat(speed) || 0;
            return {
                ip: ipPart || "-",
                area: area || "-",
                speed: speed || "-",
                speedNum: speedNum
            };
        });

        ipData.sort((a, b) => b.speedNum - a.speedNum);
        renderList();
        status.textContent = `✅ 最后更新：${new Date().toLocaleString()}`;
    } catch (e) {
        container.innerHTML = `<div class="loading">❌ 加载失败</div>`;
        status.textContent = "❌ 更新失败";
    }
}

function renderList() {
    const container = document.getElementById("ipList");
    container.innerHTML = "";

    ipData.forEach((item, index) => {
        const div = document.createElement("div");
        div.className = "ip-item";

        let starHtml = '<div class="empty-star"></div>';
        if (index === 0 || index === 1) {
            starHtml = '<div class="star">★</div>';
        }

        div.innerHTML = `
            ${starHtml}
            <span>${item.ip}</span>
            <span>${item.area}</span>
            <span>${item.speed}</span>
        `;

        div.onclick = () => {
            navigator.clipboard.writeText(item.ip).then(() => showToast());
        };
        container.appendChild(div);
    });
}

function copyAll() {
    const text = ipData.map(i => `${i.ip}#${i.area}-${i.speed}`).join("\n");
    navigator.clipboard.writeText(text).then(() => showToast("✅ 全部复制成功"));
}

function showToast(msg = "✅ IP 复制成功") {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.classList.add("show");
    setTimeout(() => t.classList.remove("show"), 1500);
}

function autoCheckUpdate() {
    setInterval(() => loadIPs(), 10000);
}

loadIPs();
autoCheckUpdate();
</script>
</body>
</html>
